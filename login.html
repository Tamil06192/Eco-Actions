<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ENVIRONET</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white dark:bg-gray-900 transition-colors duration-200">
    <!-- Page Loader -->
    <div id="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <div class="min-h-screen flex">
        <div class="absolute top-4 right-4 z-10 reveal reveal-right flex items-center gap-4">
            <button id="theme-toggle"
                class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300">
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
            <a href="home.html"
                class="flex items-center text-gray-600 dark:text-gray-300 hover:text-primary-600 transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i>
                Back to Home
            </a>
        </div>

        <!-- Left Side - Form -->
        <div
            class="flex-1 flex flex-col justify-center py-12 px-4 sm:px-6 lg:flex-none lg:px-20 xl:px-24 w-full lg:w-1/2 reveal reveal-left">
            <div class="mx-auto w-full max-w-sm lg:w-96">
                <div class="animate-fade-in-down">
                    <h2 id="login-title" class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white">Citizen Sign
                        In</h2>
                    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                        Or <a href="signup.html" class="font-medium text-primary-600 hover:text-primary-500">create a
                            new account</a>
                    </p>
                </div>

                <div class="mt-8 animate-fade-in delay-200">
                    <form id="login-form" class="space-y-6">
                        <div id="error-message"
                            class="hidden bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 p-3 rounded-md text-sm">
                        </div>

                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email
                                or Username</label>
                            <div class="mt-1">
                                <input id="email" name="email" type="text" required
                                    class="appearance-none block w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white transition-all">
                            </div>
                        </div>

                        <div>
                            <label for="password"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                            <div class="mt-1">
                                <input id="password" name="password" type="password" required
                                    class="appearance-none block w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white transition-all">
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input id="remember-me" name="remember-me" type="checkbox"
                                    class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded">
                                <label for="remember-me"
                                    class="ml-2 block text-sm text-gray-900 dark:text-gray-300">Remember me</label>
                            </div>
                            <div class="text-sm">
                                <a href="#" class="font-medium text-primary-600 hover:text-primary-500">Forgot your
                                    password?</a>
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all hover-lift hover-glow">
                            Sign in
                        </button>
                    </form>
                </div>

                <div
                    class="mt-10 pt-8 border-t border-gray-100 dark:border-gray-800 text-center animate-fade-in delay-300">
                    <p class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4">
                        Switch Login Portal</p>
                    <div class="flex justify-center gap-6">
                        <a href="#" data-role="citizen"
                            class="role-switcher text-sm font-bold text-emerald-600 hover:text-emerald-500 flex items-center hover-scale">
                            <i data-lucide="user" class="w-4 h-4 mr-1"></i> Citizen
                        </a>
                        <a href="#" data-role="volunteer"
                            class="role-switcher text-sm font-bold text-amber-600 hover:text-amber-500 flex items-center hover-scale">
                            <i data-lucide="users" class="w-4 h-4 mr-1"></i> Volunteer
                        </a>
                        <a href="#" data-role="admin"
                            class="role-switcher text-sm font-bold text-blue-600 hover:text-blue-500 flex items-center hover-scale">
                            <i data-lucide="shield-check" class="w-4 h-4 mr-1"></i> Admin
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Image -->
        <div class="hidden lg:block relative w-0 flex-1 reveal reveal-right">
            <img id="login-image" class="absolute inset-0 h-full w-full object-cover"
                src="assets/images/citizen-login.jpg" alt="Background">
            <div class="absolute inset-0 bg-primary-900/40 mix-blend-multiply"></div>
            <div class="absolute inset-0 flex flex-col justify-end p-12 text-white">
                <blockquote class="relative animate-fade-in-up delay-500">
                    <p class="text-xl font-medium leading-relaxed">"The platform is incredibly easy to use. I was able
                        to report an illegal dump site near my home, and it was cleared within a week!"</p>
                    <footer class="mt-4">
                        <p class="text-base font-semibold">Sarah Jenkins</p>
                        <p class="text-base text-primary-200">Community Activist</p>
                    </footer>
                </blockquote>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
