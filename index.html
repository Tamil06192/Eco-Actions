<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENVIRONET - Build a Greener Future</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-primary-50 dark:bg-gray-900 transition-colors duration-200">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="text-center space-y-8 animate-fade-in-up">
            <!-- Logo Animation -->
            <a href="home.html" class="relative inline-block hover:scale-105 transition-transform duration-300">
                <div
                    class="absolute inset-0 bg-primary-200 dark:bg-primary-900 rounded-full blur-2xl opacity-50 animate-pulse">
                </div>
                <div class="relative bg-primary-500 p-8 rounded-3xl shadow-xl">
                    <i data-lucide="leaf" class="w-24 h-24 text-white"></i>
                </div>
            </a>

            <!-- Brand Name & Slogan -->
            <div class="space-y-4">
                <a href="home.html" class="block hover:opacity-80 transition-opacity">
                    <h1 class="text-5xl md:text-6xl font-extrabold text-gray-900 dark:text-white tracking-tight">
                        Eco<span class="text-primary-600 dark:text-primary-400">Action</span>
                    </h1>
                </a>
                <p class="text-xl text-gray-600 dark:text-gray-300 max-w-md mx-auto">
                    Empowering communities to build a cleaner, greener future together.
                </p>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center pt-8">
                <a href="home.html">
                    <button
                        class="px-8 py-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-xl font-bold text-lg shadow-lg hover:from-emerald-700 hover:to-teal-700 transition-all flex items-center group">
                        Get Started
                        <i data-lucide="arrow-right"
                            class="ml-2 w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </a>
            </div>
        </div>

        <!-- Footer / Copyright -->
        <div class="absolute bottom-8 text-gray-400 dark:text-gray-500 text-sm">
            &copy; 2026 ENVIRONET Platform
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
